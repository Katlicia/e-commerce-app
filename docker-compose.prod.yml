services:
  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

  admin:
    build:
      context: ./admin-front
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: always
